name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v5.0.0-beta2)'
        required: false
      url:
        description: 'Installer download URL'
        required: false
      xpi_url:
        description: 'Firefox XPI URL (beta only)'
        required: false
  repository_dispatch:
    types: [new-release]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log dates

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Generate last-modified dates
        run: |
          mkdir -p _data
          cat > _data/last_modified.yml << EOF
          faq:     "$(git log -1 --format='%Y-%m-%d' -- keepass2/keeform-faq.html)"
          privacy: "$(git log -1 --format='%Y-%m-%d' -- keeform/privacy.html)"
          terms:   "$(git log -1 --format='%Y-%m-%d' -- keeform/terms.html)"
          credits: "$(git log -1 --format='%Y-%m-%d' -- keeform/credits.html)"
          EOF
          echo "Generated last_modified.yml:"
          cat _data/last_modified.yml

      - name: Write version data files
        run: |
          if [ -n "${{ github.event.client_payload.version }}" ]; then
            VERSION="${{ github.event.client_payload.version }}"
            URL="${{ github.event.client_payload.url }}"
            XPI_URL="${{ github.event.client_payload.xpi_url }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            URL="${{ github.event.inputs.url }}"
            XPI_URL="${{ github.event.inputs.xpi_url }}"
          else
            echo "No version provided, using committed data files."
            exit 0
          fi
          VERSION_BARE="${VERSION#v}"
          if echo "$VERSION_BARE" | grep -q '\-beta'; then
            cat > _data/beta.yml <<EOF
          version: "${VERSION_BARE}"
          url: "${URL}"
          xpi_url: "${XPI_URL}"
          chrome_available: false
          EOF
            echo "Written _data/beta.yml:"
            cat _data/beta.yml
          else
            cat > _data/version.yml <<EOF
          version: "${VERSION_BARE}"
          url: "${URL}"
          EOF
            echo "Written _data/version.yml:"
            cat _data/version.yml
          fi

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
