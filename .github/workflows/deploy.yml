name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log dates

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Generate last-modified dates
        run: |
          mkdir -p _data
          cat > _data/last_modified.yml << EOF
          faq:     "$(git log -1 --format=%cd --date=format:'%B %d, %Y' -- keepass2/keeform-faq.html)"
          privacy: "$(git log -1 --format=%cd --date=format:'%B %d, %Y' -- keeform/privacy.html)"
          terms:   "$(git log -1 --format=%cd --date=format:'%B %d, %Y' -- keeform/terms.html)"
          credits: "$(git log -1 --format=%cd --date=format:'%B %d, %Y' -- keeform/credits.html)"
          EOF
          echo "Generated last_modified.yml:"
          cat _data/last_modified.yml

      - name: Fetch version info from keeform/keeform
        env:
          GH_TOKEN: ${{ secrets.INSTALLER_REPO_TOKEN }}
        run: |
          # Latest tag (any, including beta) — for beta page
          LATEST_TAG=$(gh release list --repo keeform/keeform --limit 1 --json tagName --jq '.[0].tagName')
          LATEST_BARE="${LATEST_TAG#v}"
          LATEST_URL="https://github.com/keeform/keeform/releases/download/${LATEST_TAG}/KeeForm.Installer.v${LATEST_BARE}.exe"
          XPI_URL="https://github.com/keeform/keeform/releases/download/${LATEST_TAG}/keeform-beta.xpi"

          # Latest non-beta release — for install page
          RELEASE_TAG=$(gh release list --repo keeform/keeform --limit 10 --json tagName --jq '[.[] | select(.tagName | test("-beta") | not)] | .[0].tagName')
          RELEASE_BARE="${RELEASE_TAG#v}"
          RELEASE_URL="https://github.com/keeform/keeform/releases/download/${RELEASE_TAG}/KeeForm.Installer.v${RELEASE_BARE}.exe"

          echo "Latest tag:   $LATEST_TAG"
          echo "Release tag:  $RELEASE_TAG"

          mkdir -p _data

          cat > _data/beta.yml <<EOF
          version: "${LATEST_BARE}"
          url: "${LATEST_URL}"
          xpi_url: "${XPI_URL}"
          chrome_available: false
          EOF

          cat > _data/version.yml <<EOF
          version: "${RELEASE_BARE}"
          url: "${RELEASE_URL}"
          EOF

          echo "Written _data/beta.yml and _data/version.yml"

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Clean up old deployments
        uses: strumwolf/delete-deployment-environment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: github-pages
          onlyRemoveDeployments: true
          limit: 3
