    <text x="0" y="34" font-family="Arial, Helvetica, sans-serif" font-size="100" font-weight="700" fill="#ffffff" fill-opacity="0.18" text-anchor="middle">?</text>
  </g>
  
  <rect x="0" y="0" width="4" height="400" fill="url(#accent-bar)"></rect>
  
  <g fill="none" stroke="#1c62d3" stroke-opacity="0.06">
