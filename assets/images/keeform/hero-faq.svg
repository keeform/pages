<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e2050"></stop>
      <stop offset="100%" stop-color="#0c1d45"></stop>
    </linearGradient>
    <radialGradient id="glow-r" cx="100%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1c62d3" stop-opacity="0.3"></stop>
      <stop offset="100%" stop-color="#0a1428" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="glow-t" cx="30%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#1c62d3" stop-opacity="0.2"></stop>
      <stop offset="100%" stop-color="#0a1428" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c62d3"></stop>
      <stop offset="70%" stop-color="#1c62d3" stop-opacity="0.4"></stop>
      <stop offset="100%" stop-color="#1c62d3" stop-opacity="0"></stop>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1" fill="#fff" fill-opacity="0.04"></circle>
    </pattern>
  </defs>
  <rect width="1440" height="400" fill="url(#bg)"></rect>
  <rect width="1440" height="400" fill="url(#glow-r)"></rect>
  <rect width="1440" height="400" fill="url(#glow-t)"></rect>
  <rect width="1440" height="400" fill="url(#dots)"></rect>
  
  
  <g transform="translate(260,200)">
