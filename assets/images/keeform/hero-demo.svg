<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#05090f"></stop>
      <stop offset="100%" stop-color="#070d18"></stop>
    </linearGradient>
    <radialGradient id="screen-glow" cx="25%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#1c62d3" stop-opacity="0.22"></stop>
      <stop offset="60%" stop-color="#1c62d3" stop-opacity="0.06"></stop>
      <stop offset="100%" stop-color="#05090f" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="40%" stop-color="transparent"></stop>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"></stop>
    </radialGradient>
    <pattern id="scan" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="4" fill="none"></rect>
      <rect width="1" height="1" fill="#fff" fill-opacity="0.012"></rect>
    </pattern>
  </defs>
  <rect width="1440" height="400" fill="url(#bg)"></rect>
