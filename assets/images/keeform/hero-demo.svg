  </g>
  <line x1="0" y1="1" x2="1440" y2="1" stroke="#fff" stroke-opacity="0.04" stroke-width="1"></line>
  <line x1="0" y1="399" x2="1440" y2="399" stroke="#fff" stroke-opacity="0.04" stroke-width="1"></line>
  
